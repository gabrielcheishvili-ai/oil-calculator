<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ხარჯვის კალკულატორი</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            background: #1a1a1a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 60px;
            height: 60px;
        }

        h1 {
            color: #2c3e50;
            font-size: 22px;
            text-align: center;
        }

        .subtitle {
            color: #7f8c8d;
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 16px;
        }

        .result-container {
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-top: 30px;
            transition: background 0.3s ease;
        }

        .result-container.low {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        .result-container.high {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
        }

        .result-value {
            color: white;
            font-size: 48px;
            font-weight: 700;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="logo">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <ellipse fill="white" cx="100" cy="50" rx="8" ry="25"/>
                    <ellipse fill="white" cx="75" cy="70" rx="8" ry="25" transform="rotate(-30 75 70)"/>
                    <ellipse fill="white" cx="125" cy="70" rx="8" ry="25" transform="rotate(30 125 70)"/>
                </svg>
            </div>
            <h1>ხარჯვის კალკულატორი</h1>
        </div>

        <p class="subtitle">აეროზოლის ხარჯვა</p>

        <form>
            <div class="form-group">
                <label for="workDays">დღე კვირაში</label>
                <input type="number" id="workDays" min="1" max="7" value="5" required>
            </div>

            <div class="form-group">
                <label for="hoursPerDay">საათი დღეში</label>
                <input type="number" id="hoursPerDay" min="1" max="24" value="8" required>
            </div>

            <div class="form-group">
                <label for="sprayInterval">ინტერვალი (წუთი)</label>
                <input type="number" id="sprayInterval" min="1" max="1440" value="10" required>
            </div>

            <button type="button" onclick="calculate()">გამოთვლა</button>
        </form>

        <div class="result-container" id="resultContainer">
            <div style="color: rgba(255, 255, 255, 0.8); font-size: 14px;">ბალონის რესურსი</div>
            <div class="result-value" id="result">0</div>
            <div style="color: rgba(255, 255, 255, 0.9); font-size: 16px; margin-top: 8px;">კალენდარული დღე</div>
        </div>
    </div>

    <script>
        const BALLOON_MASS = 160;
        const SPRAY_CONSUMPTION = 0.05;

        function calculate() {
            const workDays = parseFloat(document.getElementById('workDays').value);
            const hoursPerDay = parseFloat(document.getElementById('hoursPerDay').value);
            const sprayInterval = parseFloat(document.getElementById('sprayInterval').value);

            const minutesPerDay = hoursPerDay * 60;
            const spraysPerDay = minutesPerDay / sprayInterval;
            const dailyConsumption = spraysPerDay * SPRAY_CONSUMPTION;
            const workDaysResource = BALLOON_MASS / dailyConsumption;
            const calendarDaysResource = Math.round((workDaysResource / workDays) * 7);

            document.getElementById('result').textContent = calendarDaysResource;

            const resultContainer = document.getElementById('resultContainer');
            if (calendarDaysResource <= 31) {
                resultContainer.classList.remove('high');
                resultContainer.classList.add('low');
            } else {
                resultContainer.classList.remove('low');
                resultContainer.classList.add('high');
            }
        }

        document.getElementById('workDays').addEventListener('input', calculate);
        document.getElementById('hoursPerDay').addEventListener('input', calculate);
        document.getElementById('sprayInterval').addEventListener('input', calculate);

        calculate();
    </script>
</body>
</html>
