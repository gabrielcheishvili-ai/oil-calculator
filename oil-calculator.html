<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Calculator</title>
</head>
<body>
    <h1>Oil Calculator</h1>
    <form id="oilCalcForm">
        <label for="volume">Volume (liters):</label>
        <input type="number" id="volume" name="volume" required>
        <label for="density">Density (kg/l):</label>
        <input type="number" id="density" name="density" required>
        <button type="submit">Calculate</button>
    </form>
    <h2>Results</h2>
    <div id="results"></div>

    <script>
        document.getElementById('oilCalcForm').onsubmit = function(event) {
            event.preventDefault();
            const volume = parseFloat(document.getElementById('volume').value);
            const density = parseFloat(document.getElementById('density').value);
            const mass = volume * density;
            document.getElementById('results').innerHTML = `Mass: ${mass} kg`;
        };
    </script>
</body>
</html>
